name: UI Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        run: |
          curl -o allure-2.30.0.tgz -Ls https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.30.0/allure-commandline-2.30.0.tgz
          tar -zxvf allure-2.30.0.tgz
          echo "$PWD/allure-2.30.0/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create Allure executor info
        run: |
          mkdir -p allure-results
          cat > allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/",
            "reportName": "Allure Report"
          }
          EOF

      - name: Create Allure environment info
        run: |
          cat > allure-results/environment.properties << EOF
          Browser=Chromium, Firefox, WebKit
          Environment=CI
          Platform=ubuntu-latest
          Node.Version=$(node --version)
          Repository=${{ github.repository }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Run.Number=${{ github.run_number }}
          Triggered.By=${{ github.actor }}
          EOF

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true
        env:
          CI: true

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Verify Allure output
        if: always()
        run: |
          ls -l allure-report
          test -f allure-report/index.html

      - name: Upload Allure HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Allure HTML to Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
